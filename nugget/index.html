<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nugget Boom</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rancho&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Nugget Boom</h1>

        <div id="player-selection">
            <label for="num-players">Number of Players (2-4):</label>
            <input type="number" id="num-players" min="2" max="4" value="2">
            <button id="start-game-btn">Start Game</button>
        </div>

        <div id="game-area" class="hidden">
            <div id="players">
                </div>
            <div id="levers-container">
                </div>
            <div id="message"></div>
            <button id="reset-round-btn" style="display:none;">Reset Round</button>
            <button id="restart-game-btn" style="display:none;">Restart Game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
